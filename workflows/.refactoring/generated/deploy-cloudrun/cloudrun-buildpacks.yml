env:
  APP: app
  GAR_LOCATION: YOUR_GAR_LOCATION
  PROJECT_ID: YOUR_PROJECT_ID
  REGION: YOUR_SERVICE_REGION
  REPOSITORY: YOUR_REPOSITORY_NAME
  SERVICE: YOUR_SERVICE_NAME
  SOURCE_DIRECTORY: YOUR_SOURCE_DIRECTORY
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - id: auth
        name: Google Auth
        uses: google-github-actions/auth@v0
        with:
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
      - id: docker-auth
        name: Docker Auth
        uses: docker/login-action@v1
        with:
          password: ${{ steps.auth.outputs.access_token }}
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
      - id: setup-tools
        uses: buildpacks/github-actions/setup-tools@v5.1.0
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.1.0
      - name: Build and Publish with Buildpacks
        run: 'pack config default-builder gcr.io/buildpacks.builder:v1

          pack build ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{
          env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }} --path=${{ env.SOURCE_DIRECTORY
          }} --publish'
      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{
            env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          service: ${{ env.SERVICE }}
      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
name: Build and Deploy to Cloud Run
'on':
  push:
    branches:
      - $default-branch
