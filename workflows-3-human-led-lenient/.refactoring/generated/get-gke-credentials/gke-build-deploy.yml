env:
  DEPLOYMENT_NAME: gke-test
  GAR_LOCATION: us-central1
  GKE_CLUSTER: cluster-1
  GKE_ZONE: us-central1-c
  IMAGE: static-site
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}
  REPOSITORY: samples
jobs:
  setup-build-publish-deploy:
    environment: production
    name: Setup, Build, Publish, and Deploy
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v0
        with:
          service_account: my-service-account@my-project.iam.gserviceaccount.com
          token_format: access_token
          workload_identity_provider: projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider
      - name: Docker configuration
        run: echo ${{steps.auth.outputs.access_token}} | docker login -u oauth2accesstoken
          --password-stdin https://$GAR_LOCATION-docker.pkg.dev
      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v0
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
      - name: Build
        run: "docker build \\\n  --tag \"$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA\"\
          \ \\\n  --build-arg GITHUB_SHA=\"$GITHUB_SHA\" \\\n  --build-arg GITHUB_REF=\"\
          $GITHUB_REF\" \\\n  ."
      - name: Publish
        run: docker push "$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA"
      - name: Set up Kustomize
        run: 'curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64

          chmod u+x ./kustomize'
      - name: Deploy
        run: './kustomize edit set image LOCATION-docker.pkg.dev/PROJECT_ID/REPOSITORY/IMAGE:TAG=$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA

          ./kustomize build . | kubectl apply -f -

          kubectl rollout status deployment/$DEPLOYMENT_NAME

          kubectl get services -o wide'
name: Build and Deploy to GKE
'on':
  push:
    branches:
      - $default-branch
