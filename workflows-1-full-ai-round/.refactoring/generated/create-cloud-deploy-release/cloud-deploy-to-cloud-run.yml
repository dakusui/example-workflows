env:
  APP: app
  GAR_LOCATION: YOUR_GAR_LOCATION
  PROJECT_ID: YOUR_PROJECT_ID
  REGION: YOUR_APP_REGION
jobs:
  deploy:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - id: auth
        name: Google auth
        uses: google-github-actions/auth@v1
        with:
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
      - name: Docker auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev
      - name: Build and push container
        run: 'docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID
          }}/${{ env.APP }}/${{ env.APP }}:${{ github.sha }}" ./app

          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{
          env.APP }}/${{ env.APP }}:${{ github.sha }}"'
      - name: Render templatised config manifests
        run: 'export PROJECT_ID="${{ env.PROJECT_ID }}"

          export REGION="${{ env.REGION }}"

          for template in $(ls config/*.template.yaml); do envsubst < ${template}
          > ${template%%.*}.yaml ; done'
      - name: Create Cloud Deploy delivery pipeline
        run: gcloud deploy apply --file config/clouddeploy.yaml --region ${{ env.GAR_LOCATION
          }}
      - name: Create release name
        run: echo "RELEASE_NAME=${{ env.APP }}-${GITHUB_SHA::7}-${GITHUB_RUN_NUMBER}"
          >> ${GITHUB_ENV}
      - id: release
        name: Create Cloud Deploy release
        uses: google-github-actions/create-cloud-deploy-release@v0
        with:
          delivery_pipeline: ${{ env.APP }}
          description: ${{ env.GITHUB_COMMIT_MSG }}
          images: app=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{
            env.APP }}/${{ env.APP }}:${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          region: ${{ env.REGION }}
          skaffold_file: config/skaffold.yaml
      - name: Report Cloud Deploy release
        run: 'echo "Created release ${{ steps.release.outputs.name }} "

          echo "Release link ${{ steps.release.outputs.link }} "'
name: Build app and create a release in Cloud Deploy
'on':
  push:
    branches:
      - $default_branch
